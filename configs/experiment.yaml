target:
  horizon_days: 5
  positive_class: UP
  negative_class: DOWN
  threshold: 0.0
  horizons:
    - 1
    - 3
    - 5

data:
  start_date: "2016-01-01"
  end_date: "2026-02-23"
  tickers:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - TSLA
    - AMD
    - INTC
    - ORCL

training:
  seed: 42
  batch_size: 32
  learning_rate: 0.0001
  epochs: 20
  weight_decay: 0.0001
  loss_weights:
    direction: 1.0
    volatility: 0.5
    fundamental_surprise: 1.0

models:
  document_backbone: "ProsusAI/finbert"
  news_backbone: "ProsusAI/finbert"
  price_input_window: 60
  price_encoder: "bilstm"
  graph_encoder: "gat"
  tasks:
    - direction
    - volatility
    - fundamental_surprise

labels:
  direction:
    classes: ["DOWN", "UP"]
  fundamental_surprise:
    classes: ["MISS", "BEAT"]
  realized_volatility:
    method: "std_of_log_returns"
    lookback_days: 20
