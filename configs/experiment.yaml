target:
  horizon_days: 60 # PRIMARY target: 60-day direction
  positive_class: UP
  negative_class: DOWN
  threshold: 0.0
  horizons:
    - 5
    - 60

data:
  start_date: "2016-01-01"
  end_date: "2026-02-23"
  tickers:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - TSLA
    - AMD
    - INTC
    - ORCL

training:
  seed: 42
  batch_size: 512
  learning_rate: 0.0001
  epochs: 20
  weight_decay: 0.0001
  use_amp: true
  num_workers: 4
  pin_memory: true
  loss_weights:
    direction: 0.7 # ListNet ranking loss
    volatility: 0.3 # MSE volatility loss

models:
  document_backbone: "ProsusAI/finbert"
  price_input_window: 60
  price_encoder: "bilstm"
  graph_encoder: "gat"
  tasks:
    - direction
    - volatility

labels:
  direction:
    classes: ["DOWN", "UP"]
  realized_volatility:
    method: "std_of_log_returns"
    lookback_days: 20
